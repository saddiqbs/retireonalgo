<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>$Retire on Algo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a12; font-family: sans-serif; color: #CECBF6; min-height: 100vh; }
    nav { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-bottom: 0.5px solid #2a2840; }
    .nav-logo { font-size: 18px; font-weight: 500; color: #CECBF6; }
    .nav-logo span { color: #7F77DD; }
    #connect-btn { background: #1a1830; border: 1px solid #534AB7; color: #AFA9EC; padding: 8px 20px; border-radius: 20px; font-size: 14px; cursor: pointer; }
    #connect-btn:hover { background: #24204a; }
    .wallet-info { display: none; align-items: center; gap: 10px; }
    .wallet-address { font-size: 13px; color: #7F77DD; background: #1a1830; border: 1px solid #2a2840; padding: 6px 14px; border-radius: 20px; }
    #disconnect-btn { background: transparent; border: 1px solid #3a3060; color: #534AB7; padding: 6px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; }
    .main { max-width: 1000px; margin: 0 auto; padding: 40px 24px; }
    .welcome { text-align: center; padding: 80px 24px; }
    .welcome h1 { font-size: 32px; font-weight: 500; color: #CECBF6; margin-bottom: 12px; }
    .welcome p { font-size: 15px; color: #534AB7; line-height: 1.7; max-width: 400px; margin: 0 auto 24px; }
    #error-msg { color: #F09595; font-size: 13px; margin-top: 12px; display: none; }
  </style>
</head>
<body>

  <nav>
    <div class="nav-logo">$<span>Retire</span> on Algo</div>
    <button id="connect-btn">Connect wallet</button>
    <div class="wallet-info" id="wallet-info">
      <div class="wallet-address" id="wallet-address"></div>
      <button id="disconnect-btn">Disconnect</button>
    </div>
  </nav>

  <div class="main">
    <div class="welcome" id="welcome">
      <h1>Your Algorand DeFi dashboard</h1>
      <p>Connect your Pera wallet to see your positions, earnings, and the best pool opportunities on Algorand.</p>
      <div id="error-msg"></div>
    </div>
  </div>

  <script type="module">
    import { PeraWalletConnect } from 'https://esm.sh/@perawallet/connect@1.3.4';

    const peraWallet = new PeraWalletConnect();

    const connectBtn = document.getElementById('connect-btn');
    const walletInfo = document.getElementById('wallet-info');
    const walletAddress = document.getElementById('wallet-address');
    const disconnectBtn = document.getElementById('disconnect-btn');
    const errorMsg = document.getElementById('error-msg');

    function shortAddress(addr) {
      return addr.slice(0, 6) + '...' + addr.slice(-4);
    }

    function onConnect(addr) {
      connectBtn.style.display = 'none';
      walletInfo.style.display = 'flex';
      walletAddress.textContent = shortAddress(addr);
    }

    function onDisconnect() {
      connectBtn.style.display = 'block';
      walletInfo.style.display = 'none';
      walletAddress.textContent = '';
    }

    try {
      const accounts = await peraWallet.reconnectSession();
      if (accounts.length) onConnect(accounts[0]);
    } catch(e) {}

    connectBtn.addEventListener('click', async () => {
      try {
        errorMsg.style.display = 'none';
        const accounts = await peraWallet.connect();
        onConnect(accounts[0]);
      } catch(e) {
        errorMsg.textContent = 'Connection failed. Please try again.';
        errorMsg.style.display = 'block';
      }
    });

    disconnectBtn.addEventListener('click', () => {
      peraWallet.disconnect();
      onDisconnect();
    });
  </script>

</body>
</html>
